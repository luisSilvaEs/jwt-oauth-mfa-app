name: Update Changelog

on:
  pull_request:
    types: [closed]
    branches: [develop, main]

jobs:
  changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          # Read current version from CHANGELOG.md (first ## line)
          CURRENT=$(grep -m1 '^## ' CHANGELOG.md | grep -oP '\d+\.\d+\.\d+' || echo "1.0.0")
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)

          if [ "${{ github.base_ref }}" = "main" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          else
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Prepend to CHANGELOG
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          VERSION: ${{ steps.version.outputs.new_version }}
          DATE: ${{ github.event.pull_request.merged_at }}
        run: |
          # Build the new entry
          ENTRY="## $VERSION - ${DATE:0:10}\n\n**$PR_TITLE**\n\n$PR_BODY\n\n---\n\n"

          # Prepend to CHANGELOG.md (create if missing)
          if [ ! -f CHANGELOG.md ]; then
            echo -e "# Changelog\n\n$ENTRY" > CHANGELOG.md
          else
            echo -e "$ENTRY$(cat CHANGELOG.md)" > CHANGELOG.md
          fi

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for v${{ steps.version.outputs.new_version }}"
          git push
